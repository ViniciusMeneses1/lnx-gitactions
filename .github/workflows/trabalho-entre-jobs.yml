name: Trabalho entre jobs

on:
  push:
    branches:
      - main

jobs:
  job_1:
    runs-on: ubuntu-latest
    steps:
      - name: Confere versao do Ubuntu
        run: cat /etc/os-release

      - name: Exibir uma mensagem
        run: echo "Estou fazendo o curso de Github Actions da Linuxtips" > mensagem.txt

      - uses: actions/upload-artifact@v4
        with:
          name: strigus
          path: mensagem.txt

  job_2:
    runs-on: ubuntu-latest
    needs: job_1
    steps:
      - name: Ver conteúdo do diretório
        run: ls -lha

      - uses: actions/download-artifact@v4
        with:
          name: strigus

      - name: Acessa arquivo mensagem
        run: cat mensagem.txt